name: CI

\\ to work only in main branch. workflow_dispatch is directly to run it
on: 
  push:
    branches:
      main: 
  workflow_dispatch: 

jobs:
  unit-tests-backend:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4 // checkout source code - in Jenkins is automatic

      - name: Set up go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
          cache-dependency-path: butracker-backend/go.sum

      - name: Execute Backend Unit tests
        working-directory: ./bugtracker-backend
        run: | 
          go test -v ./...